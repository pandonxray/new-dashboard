  - name: PP基差_华北
    formula: PP_basis_north_china
    enabled: true
    category: 基差
    notes: 华北PP基差，定义为华北拉丝现货价减去PP活跃合约收盘价。
    decomposition:
      type: spread
      target_label: PP basis north china
      target_expr: spot - future
      components:
        - key: spot
          label: North China PP spot
          expr: PP_spot_north_china
        - key: future
          label: PP active future
          expr: PP_c

  - name: PP基差_华东
    formula: PP_basis_east_china
    enabled: true
    category: 基差
    notes: 华东PP基差，现货腿取六个华东报价的每日最小值。
