weekly:
  sections:
    - id: pdh
      title: PDH板块
      description: PP销售端减丙烷进口成本端，近端观察M+1窗口，1/5/9观察主力合约窗口。
      charts: [pdh_margin_mplus_seasonal, pdh_margin_01_seasonal, pdh_margin_05_seasonal, pdh_margin_09_seasonal]
    - id: propane_price_spread
      title: 丙烷价格与月差
      description: 现货评估、现货-纸货差和FEI近月月差共同描述丙烷近端定价状态。
      charts: [afei_seasonal, afei_propane_m1_diff_seasonal, fei_m1_m2_spread_seasonal]
    - id: propane_freight_region
      title: 丙烷区域与运费
      description: 美湾码头费和中东/美湾到远东航线成本用于把离岸资源转换为远东到岸经济性。
      charts: [usgc_terminal_seasonal, ras_tanura_chiba_seasonal, houston_chiba_seasonal]
    - id: propane_structure
      title: 丙烷期限与价差结构
      description: FEI、CP期限结构展示丙烷远期曲线，FEI-MOPJ展示丙烷相对石脑油结构。
      charts: [fei_curve_snapshots, cp_curve_snapshots, fei_mopj_structure]
    - id: naphtha_spot
      title: NAP现货与贴水
      description: MOPJ strip、CFR Japan贴水和CFR Japan cargo共同描述亚洲石脑油现货到岸价格。
      charts: [naphtha_mopj_strip_45_75_seasonal, naphtha_cfr_japan_pd_seasonal, naphtha_cfr_japan_cargo_seasonal]
    - id: naphtha_structure
      title: NAP结构与替代价差
      description: MOPJ期限结构观察石脑油曲线，AFEI-Naphtha Cargo观察轻烃相对石脑油替代价差。
      charts: [mopj_curve_snapshots, afei_naphtha_cargo_spread_seasonal]

daily:
  sections:
    - id: key_curves
      title: 核心结构快照
      charts: [fei_curve_snapshots, mopj_curve_snapshots, fei_mopj_structure, fei_cp_structure, pdh_margin_seasonal]
    - id: seasonal_deviation
      title: 季节性偏离
      charts: [fei_seasonal, pdh_margin_seasonal, downstream_profit_seasonal]
