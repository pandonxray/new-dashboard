  - name: LPG_FEI_01_spread
    formula: (DATE_INT < 20250401) * (LPG01 - FEI01 * USDCHY * 1.09 * 1.01) + (DATE_INT >= 20250401) * (LPG01 - FEI01 * USDCHY * 1.09 * 1.11)
    enabled: true
    category: LPG内外价差
    notes: LPG01 minus FEI01 with tariff coefficient switch on 2025-04-01
    decomposition:
      type: spread
      target_label: LPG FEI 01 spread
      target_expr: domestic_lpg - fei * fx * vat * tariff
      components:
        - key: domestic_lpg
          label: LPG01
          expr: LPG01
        - key: fei
          label: FEI01
          expr: FEI01
        - key: fx
          label: USDCHY
          expr: USDCHY
        - key: vat
          label: VAT
          expr: 1.09
        - key: tariff
          label: Tariff
          expr: (DATE_INT < 20250401) * 1.01 + (DATE_INT >= 20250401) * 1.11
      derived:
        - key: import_cost
          label: Imported LPG cost
          expr: fei * fx * vat * tariff

