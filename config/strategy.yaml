  - name: FEI_PDH_01
    formula: (DATE_INT < 20250401) * (PP01 - FEI01 * USDCHY * 1.01 * 1.09 * 1.17) + (DATE_INT >= 20250401) * (PP01 - FEI01 * USDCHY * 1.11 * 1.09 * 1.17)
    enabled: true
    category: FEI_PDH
    notes: FEI 01 with different tariff coefficients before and after 2025-04-01
    decomposition:
      type: spread
      target_label: FEI PDH 01
      target_expr: domestic_pp - fei * fx * tariff * vat * yield_factor
      components:
        - key: domestic_pp
          label: PP01
          expr: PP01
        - key: fei
          label: FEI01
          expr: FEI01
        - key: fx
          label: USDCHY
          expr: USDCHY
        - key: tariff
          label: Tariff
          expr: (DATE_INT < 20250401) * 1.01 + (DATE_INT >= 20250401) * 1.11
        - key: vat
          label: VAT
          expr: 1.09
        - key: yield_factor
          label: Yield factor
          expr: 1.17
      derived:
        - key: import_cost
          label: Imported PDH cost
          expr: fei * fx * tariff * vat * yield_factor

