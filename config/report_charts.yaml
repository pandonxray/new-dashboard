    title: PDH利润动态近月季节性
    title_template: "PDH利润 {month_label}（{tenor}月）季节性"
    source: portfolios
    dynamic_tenor:
      offset: 1
      avoid: ["01", "05", "09"]
      fallback_offset: 2
    candidate_templates: ["FEI_PDH_{tenor}", "Domestic_PDH_{tenor}"]
  pdh_margin_01_seasonal:
